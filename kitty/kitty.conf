hide_window_decorations yes
# ⌃ + ⌘ + , (Control + Command + Comma) reload_config

# Font configuration
font_family Cascursive
//font_family Kelmscott Mono
italic_font Cascursive Italic
font_size 13

# font_family "PPRightSerifMono Nerd Font"

# all of these settings for Kelmscott Mono
# font_family Kelmscott Mono
# modify_font cell_height 120%
# modify_font cell_width 105%


# Enable ligatures
disable_ligatures never

background_opacity 0.2 
background_blur 10

# Ember — minimal single-hue scheme
foreground #ff9a10
background #170800

# Black
color0 #170800
color8 #4a2c05

# Red
color1 #ff5a1a
color9 #ff5a1a

# Green (using a dim amber)
color2  #c27309
color10 #c27309

# Yellow (primary fg)
color3  #ff9a10
color11 #ffb347

# Blue (muted amber)
color4  #7a4a08
color12 #7a4a08

# Magenta (brightest amber)
color5  #ffd280
color13 #ffd280

# Cyan (dim amber)
color6  #c27309
color14 #ffb347

# White
color7  #ff9a10
color15 #ffd280

# Cursor colors
cursor #ff9a10
cursor_text_color #170800

# Selection colors
selection_foreground #ffd280
selection_background #341705

# URL color
url_color #ffd280

# Tab bar colors
active_tab_foreground #170800
active_tab_background #ff9a10
inactive_tab_foreground #c27309
inactive_tab_background #1f0e03

# Window border colors
active_border_color #ff9a10
inactive_border_color #4a2c05

# Bell colors
bell_border_color #ff5a1a
